<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#C8511A;--brand-lt:#FAECE7;--brand-dk:#993C1D;
  --bg:#F5F4F1;--surface:#FFFFFF;--surface2:#F9F8F6;
  --border:#E8E5E0;--border2:#D8D4CE;
  --text:#1A1917;--text2:#6B6560;--text3:#9B958E;
  --green:#059669;--green-lt:#D1FAE5;
  --blue:#3B6CF7;--blue-lt:#E6EFFE;
  --amber:#D97706;--amber-lt:#FEF3C7;
  --red:#DC2626;--red-lt:#FEE2E2;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;transition:border-color .15s,box-shadow .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(200,81,26,.1)}
textarea{resize:vertical;min-height:72px}
button{cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
button:active{transform:scale(.98)}
label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.req{color:var(--brand)}
.hidden{display:none!important}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;white-space:nowrap;box-shadow:var(--shadow)}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 2px 6px rgba(200,81,26,.3)}
.btn-primary:hover{background:var(--brand-dk)}
.btn-danger{color:var(--red);border-color:rgba(220,38,38,.2)}
.btn-danger:hover{background:var(--red-lt)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:var(--r-sm)}
.btn-icon{padding:6px 8px;border-radius:var(--r-sm)}
.btn-ghost{border:none;background:none;box-shadow:none;padding:6px 8px}
.btn-ghost:hover{background:var(--surface2)}

/* ── Layout ── */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:54px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.layout{display:flex;flex:1}
.sidebar{width:205px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border-left:2px solid transparent;transition:all .12s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{color:var(--brand);background:var(--brand-lt);border-left-color:var(--brand)}
.nav-item i{font-size:17px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--brand);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.sidebar-footer{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border)}
.content{flex:1;padding:24px;background:var(--bg);overflow-y:auto}

/* ── Logo SVG inline ── */
.logo-svg{height:34px;width:auto}
.logo-sm{height:26px;width:auto}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.b-new{background:var(--blue-lt);color:#1E40AF}
.b-ra{background:var(--amber-lt);color:#92400E}
.b-rg{background:var(--green-lt);color:#065F46}
.b-done{background:#A7F3D0;color:#064E3B}
.b-dis{background:#EDE9FE;color:#5B21B6}
.b-lost{background:var(--red-lt);color:#991B1B}
.bd-new{background:#3B82F6}.bd-ra{background:#F59E0B}.bd-rg{background:#10B981}.bd-done{background:#059669}.bd-dis{background:#7C3AED}.bd-lost{background:#EF4444}

/* ── Page head ── */
.page-head{margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start}
.page-title{font-size:20px;font-weight:600}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--shadow)}
.stat-num{font-size:24px;font-weight:600}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px;font-weight:500}

/* ── Table ── */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.tbl th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--surface2);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--surface2);cursor:pointer}
.tbl-empty{text-align:center;padding:48px 20px;color:var(--text3)}
.tbl-empty i{font-size:36px;display:block;margin-bottom:10px;opacity:.5}

/* ── Filters ── */
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-row select,.filter-row input{flex:1;min-width:100px;font-size:12px;padding:7px 11px}
.filter-row input[type=date]{flex:none;width:auto}

/* ── Form ── */
.fg{margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-err{font-size:12px;color:var(--red);min-height:16px;margin-bottom:8px}
.form-section{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);z-index:200;max-height:180px;overflow-y:auto;margin-top:3px;display:none;box-shadow:var(--shadow-md)}
.ac-item{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--surface2)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

/* ── Product table ── */
.prod-form-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;margin-bottom:12px}
.prod-form-tbl{width:100%;border-collapse:collapse;font-size:13px}
.prod-form-tbl th{padding:8px 10px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--surface2);text-align:left;text-transform:uppercase;letter-spacing:.04em}
.prod-form-tbl td{padding:7px 8px;border-bottom:1px solid var(--border);background:var(--surface);vertical-align:middle}
.prod-form-tbl tr:last-child td{border-bottom:none}
.prod-tbl{width:100%;border-collapse:collapse;font-size:13px}
.prod-tbl th{padding:8px 12px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--surface2);text-align:left;text-transform:uppercase;letter-spacing:.04em}
.prod-tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.prod-tbl tr:last-child td{border-bottom:none}
.rate-val{color:var(--brand);font-weight:600;font-family:'DM Mono',monospace;font-size:13px}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--r-xl);width:580px;max-width:100%;border:1px solid var(--border);box-shadow:var(--shadow-lg);overflow:hidden}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.modal-body{padding:20px;max-height:58vh;overflow-y:auto}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--surface2)}
.detail-row{display:flex;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);gap:12px;font-size:13px}
.detail-row:last-child{border-bottom:none}
.dl{color:var(--text2);min-width:110px;flex-shrink:0;font-size:12px;font-weight:500;padding-top:1px}
.dv{color:var(--text);flex:1}
.hist-item{font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);display:flex;gap:10px}
.hist-item:last-child{border-bottom:none}
.hist-time{color:var(--text3);flex-shrink:0;min-width:110px;font-family:'DM Mono',monospace;font-size:11px;padding-top:1px}
.hist-txt{color:var(--text2)}

/* ── Stage pills ── */
.stage-pills{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.stage-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .12s}
.stage-pill:hover,.stage-pill.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.stage-pill.lost-pill:hover{background:var(--red);border-color:var(--red);color:#fff}
.lost-form{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-top:10px}

/* ── Kanban ── */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;align-items:flex-start}
.k-col{flex:0 0 210px;display:flex;flex-direction:column}
.k-head{padding:10px 14px;border-radius:var(--r-md) var(--r-md) 0 0;display:flex;align-items:center;justify-content:space-between}
.k-title{font-size:13px;font-weight:600;color:#fff}
.k-cnt{background:rgba(255,255,255,.25);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.k-body{background:var(--surface2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r-md) var(--r-md);flex:1;padding:8px;display:flex;flex-direction:column;gap:8px;min-height:120px}
.k-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;cursor:pointer;box-shadow:var(--shadow);transition:box-shadow .15s,transform .15s}
.k-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.k-company{font-size:13px;font-weight:600;margin-bottom:2px}
.k-customer{font-size:11px;color:var(--text2);margin-bottom:7px}
.k-prod-line{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text3);line-height:1.7}
.k-rate{color:var(--brand);font-weight:600;font-family:'DM Mono',monospace;font-size:11px}
.k-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.k-sales{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.k-date{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.k-empty{text-align:center;padding:20px 8px;color:var(--text3);font-size:12px}

/* ── Avatar ── */
.av{width:32px;height:32px;border-radius:50%;background:var(--brand-lt);color:var(--brand);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.ci{border-radius:8px;background:var(--brand-lt);color:var(--brand);display:inline-flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}

/* ── Users page ── */
.user-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.role-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.tag-mgr{background:var(--amber-lt);color:#92400E}
.tag-sales{background:var(--blue-lt);color:#1E40AF}

/* ── Login ── */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(circle at 25% 25%,rgba(200,81,26,.07) 0%,transparent 50%),radial-gradient(circle at 75% 75%,rgba(59,108,247,.05) 0%,transparent 50%)}
.login-box{width:380px;max-width:calc(100vw - 32px)}

/* ── Spinner ── */
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(200,81,26,.2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.loading-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 32px;text-align:center;box-shadow:var(--shadow-lg)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--r-md);font-size:13px;z-index:9999;box-shadow:var(--shadow-md);opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

/* ── Change password panel ── */
.cp-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-top:12px}
</style>
</head>

// ── API ────────────────────────────────────────────────────
async function api(params) {
  try {
    const res = await fetch(API_URL + '?' + new URLSearchParams(params));
    return await res.json();
  } catch(e) { return {success:false,error:e.message}; }
}

function showLoad(msg='Loading...') {
  let el = document.getElementById('load');
  if (!el) {
    el = document.createElement('div');
    el.id='load'; el.className='loading-overlay';
    el.innerHTML=`<div class="loading-box"><div class="spinner" style="margin:0 auto 12px"></div><div style="font-size:13px;color:var(--text2)">${msg}</div></div>`;
    document.body.appendChild(el);
  }
}
function hideLoad() { const e=document.getElementById('load'); if(e) e.remove(); }

function toast(msg,d=2500) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}

// ── Init ───────────────────────────────────────────────────
async function init() {
  showLoad('Starting up...');
  const [ur,ir] = await Promise.all([api({action:'getUsers'}),api({action:'getInquiries'})]);
  S.users = ur.success ? ur.data.map(u=>({...u, password:String(u.password).trim()})) : [];
  S.inquiries = ir.success ? ir.data.map(normalizeInquiry) : [];
  hideLoad(); draw();
}

function normalizeInquiry(i) {
  // Fix field name mismatches from Google Sheets (snake_case → camelCase)
  i.salesId   = i.salesId   || i.sales_id   || i['sales_id']   || '';
  i.salesName = i.salesName || i.sales_name || i['sales_name'] || '';
  i.lostReason= i.lostReason|| i.lost_reason|| i['lost_reason']|| '';
  i.createdAt = i.createdAt || (i.created_at ? new Date(i.created_at).getTime() : Date.now());
  i.products  = Array.isArray(i.products) ? i.products : [];
  i.history   = Array.isArray(i.history)  ? i.history  : [];
  return i;
}

function draw() { document.getElementById('app').innerHTML=''; buildApp(); }
function buildApp() { if(!S.user) { buildLogin(); return; } buildShell(); }

      <div style="text-align:center;margin-bottom:28px">
        <div style="display:inline-block;margin-bottom:16px"><img src="${LOGO_URI}" alt="JCM Enterprise" style="height:60px;width:auto"></div>

      </div>
      <div class="card">
        <div class="fg">
          <label>Your name</label>
          <input id="ln" placeholder="Enter your name" autocomplete="off" list="ulist">
          <datalist id="ulist">${S.users.map(u=>`<option value="${u.name}">`).join('')}</datalist>
        </div>
        <div class="fg">
          <label>Password</label>
          <input id="lp" type="password" placeholder="Enter password">
        </div>
        <div class="form-err" id="lerr"></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" onclick="doLogin()">

function doLogin() {
  const n=document.getElementById('ln').value.trim().toLowerCase();
  const p=document.getElementById('lp').value.trim();
  // Compare as strings, trim whitespace from both sides
  const u=S.users.find(x=>x.name.toLowerCase().trim()===n && String(x.password).trim()===String(p).trim());
  if(!u){
    // Debug: log what we have vs what was entered
    console.log('Login attempt:', n, '| entered pw:', p);
    console.log('Users loaded:', S.users.map(x=>({name:x.name, pw:String(x.password), type:typeof x.password})));
    document.getElementById('lerr').textContent='Incorrect name or password.';
    return;
  }
  S.user=u; S.page=u.role==='manager'?'dashboard':'inquiries'; draw();
}
function doLogout(){S.user=null;draw();}

function goPage(pg) {
  S.page=pg;
  const map={dashboard:'Dashboard',inquiries:'My Inquiries',new:'New Inquiry',all:'All Inquiries',users:'Users'};
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.textContent.trim()===map[pg]));
  renderPage();
}

function renderPage() {
  const ca=document.getElementById('ca'); if(!ca) return;
  const p=S.page;
  if(p==='dashboard')pgDash(ca);
  else if(p==='inquiries')pgInq(ca);
  else if(p==='new')pgNew(ca);
  else if(p==='all')pgAll(ca);
  else if(p==='users')pgUsers(ca);
}

// ── Change Password modal ──────────────────────────────────
function openChangePassword() {
  document.getElementById('ms').innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="width:380px">
      <div class="modal-head">
        <div style="font-size:15px;font-weight:600">Change Password</div>
        <button class="btn-ghost" onclick="closeModal()"><i class="ti ti-x" style="font-size:16px"></i></button>
      </div>
      <div class="modal-body">
        <div class="fg"><label>Current password</label><input id="cp-old" type="password" placeholder="Enter current password"></div>
        <div class="fg"><label>New password</label><input id="cp-new" type="password" placeholder="Enter new password"></div>
        <div class="fg"><label>Confirm new password</label><input id="cp-conf" type="password" placeholder="Confirm new password"></div>
        <div class="form-err" id="cp-err"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="doChangePassword()"><i class="ti ti-check"></i> Update password</button>
      </div>
    </div>
  </div>`;
}

async function doChangePassword() {
  const old=document.getElementById('cp-old').value;
  const nw=document.getElementById('cp-new').value;
  const cf=document.getElementById('cp-conf').value;
  const err=document.getElementById('cp-err');
  if(!old||!nw||!cf){err.textContent='All fields are required.';return;}
  if(String(old)!==String(S.user.password)){err.textContent='Current password is incorrect.';return;}
  if(nw!==cf){err.textContent='New passwords do not match.';return;}
  if(nw.length<4){err.textContent='Password must be at least 4 characters.';return;}
  showLoad('Updating password...');
  const res=await api({action:'changePassword',id:S.user.id,newPassword:nw});
  hideLoad();
  if(res.success){
    S.user.password=nw;
    const u=S.users.find(u=>u.id===S.user.id);
    if(u) u.password=nw;
    closeModal(); toast('Password updated successfully!');
  } else { document.getElementById('cp-err').textContent='Error: '+res.error; }
}

// ── My Inquiries (own only) ────────────────────────────────
function pgInq(ca) {
  let list=S.inquiries.filter(i=>i.salesId===S.user.id).sort((a,b)=>b.createdAt-a.createdAt);
  if(S.fs!=='all')list=list.filter(i=>i.stage===S.fs);
  if(S.fq){const q=S.fq.toLowerCase();list=list.filter(i=>i.company.toLowerCase().includes(q)||i.customer.toLowerCase().includes(q)||(i.products||[]).some(p=>p.name.toLowerCase().includes(q)));}
  ca.innerHTML=`
  <div class="page-head">
    <div><div class="page-title">My Inquiries</div><div class="page-sub">${list.length} record${list.length!==1?'s':''}</div></div>
    <button class="btn btn-primary btn-sm" onclick="goPage('new')"><i class="ti ti-plus"></i> New</button>
  </div>
  <div class="filter-row">
    <select onchange="S.fs=this.value;renderPage()"><option value="all">All stages</option>${STAGES.map(s=>`<option value="${s}" ${S.fs===s?'selected':''}>${s}</option>`).join('')}</select>
    <input placeholder="Search company, customer, product..." oninput="S.fq=this.value;renderPage()" value="${S.fq}" style="flex:2;min-width:160px">
  </div>
  ${inqTable(list,false)}`;
}

// ── All Inquiries ──────────────────────────────────────────
function pgAll(ca) {
  const isMgr=S.user.role==='manager';
  const all=S.inquiries;
  const salesUsers=S.users.filter(u=>u.role!=='manager');
  let list=all.slice().sort((a,b)=>b.createdAt-a.createdAt);
  if(S.fs!=='all')list=list.filter(i=>i.stage===S.fs);
  if(S.fp!=='all')list=list.filter(i=>i.salesId===S.fp);
  if(S.fsrc!=='all')list=list.filter(i=>i.source===S.fsrc);
  if(S.fd)list=list.filter(i=>new Date(i.createdAt).toISOString().startsWith(S.fd));
  if(S.fq){const q=S.fq.toLowerCase();list=list.filter(i=>i.company.toLowerCase().includes(q)||i.customer.toLowerCase().includes(q)||(i.products||[]).some(p=>p.name.toLowerCase().includes(q)));}
  ca.innerHTML=`
  <div class="page-head">
    <div><div class="page-title">All Inquiries</div><div class="page-sub">${isMgr?'Manager view — ':'Read-only — '}${all.length} total records</div></div>
  </div>
  <div class="stats-row" style="grid-template-columns:repeat(${STAGES.length},1fr)">
    ${STAGES.map(s=>`<div class="stat" style="border-top:3px solid ${KAN_CLR[s]}"><div class="stat-num">${all.filter(i=>i.stage===s).length}</div><div class="stat-lbl">${s}</div></div>`).join('')}

    <select onchange="S.fs=this.value;renderPage()"><option value="all">All stages</option>${STAGES.map(s=>`<option value="${s}" ${S.fs===s?'selected':''}>${s}</option>`).join('')}</select>

        <label>Company name <span class="req">*</span></label>
        <input id="fc" placeholder="Start typing company name..." autocomplete="off" oninput="acCo(this)" value="${editing?editing.company:''}">
        <div id="ac-co" class="ac-drop"></div>
      </div>
      <div class="fg ac-wrap">
        <label>Customer name <span class="req">*</span></label>
        <input id="fcu" placeholder="Contact person" autocomplete="off" value="${editing?editing.customer:''}">
        <div id="ac-ct" class="ac-drop"></div>
      </div>
      <div class="frow">
        <div class="fg"><label>Contact number <span class="req">*</span></label><input id="fco" placeholder="+91 98765 43210" value="${editing?editing.contact:''}"></div>
        <div class="fg"><label>Source <span class="req">*</span></label>
          <select id="fsr"><option value="">Select source...</option>${SOURCES.map(s=>`<option ${editing&&editing.source===s?'selected':''}>${s}</option>`).join('')}</select>
        </div>
      </div>
      <div class="fg"><label>Stage</label>
        <select id="fst">${STAGES.filter(s=>s!=='Lost').map(s=>`<option ${editing&&editing.stage===s?'selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="form-section" style="margin:0">Products <span class="req">*</span></div>
        <button class="btn btn-sm" onclick="addProdRow()"><i class="ti ti-plus"></i> Add product</button>
      </div>
      <div class="prod-form-wrap">
        <table class="prod-form-tbl">
          <thead><tr><th style="width:36%">Product name</th><th style="width:17%">Quantity</th><th style="width:17%">Rate</th><th style="width:22%">Status</th><th style="width:8%"></th></tr></thead>
          <tbody id="prod-body"></tbody>
        </table>
      </div>
      <div class="fg"><label>Note / instructions</label><textarea id="fnt" placeholder="Any special instructions or notes...">${editing?editing.note:''}</textarea></div>
      <div class="form-err" id="fe"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="submitInq()"><i class="ti ti-device-floppy"></i> ${editing?'Save changes':'Save inquiry'}</button>
        <button class="btn" onclick="cancelNew()"><i class="ti ti-x"></i> Cancel</button>
      </div>
    </div>
  </div>`;
  renderProdRows();
  document.getElementById('fc').addEventListener('blur',()=>setTimeout(()=>{const d=document.getElementById('ac-co');if(d)d.style.display='none';},200));
  document.getElementById('fcu').addEventListener('blur',()=>setTimeout(()=>{const d=document.getElementById('ac-ct');if(d)d.style.display='none';},200));
}

function renderProdRows() {
  const tb=document.getElementById('prod-body');if(!tb)return;
  tb.innerHTML=formProds.map((p,i)=>`<tr>
    <td><input placeholder="e.g. 6205 Ball Bearing" value="${p.name}" oninput="formProds[${i}].name=this.value" style="font-size:13px"></td>
    <td><input placeholder="50 pcs" value="${p.qty}" oninput="formProds[${i}].qty=this.value" style="font-size:13px"></td>
    <td><input placeholder="₹45/pc" value="${p.rate}" oninput="formProds[${i}].rate=this.value" style="font-size:13px;color:var(--brand);font-weight:500"></td>
    <td><select onchange="formProds[${i}].status=this.value" style="font-size:12px">${PROD_STATUS.map(s=>`<option ${p.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
    <td style="text-align:center">${formProds.length>1?`<button class="btn btn-icon btn-sm btn-danger" onclick="removeProdRow(${i})"><i class="ti ti-trash" style="font-size:12px"></i></button>`:''}</td>
  </tr>`).join('');
}
function addProdRow(){formProds.push({name:'',qty:'',rate:'',status:'Pending'});renderProdRows();}
function removeProdRow(i){if(formProds.length<=1)return;formProds.splice(i,1);renderProdRows();}
function cancelNew(){S.editId=null;formProds=[{name:'',qty:'',rate:'',status:'Pending'}];S.page=S.user.role==='manager'?'all':'inquiries';renderPage();}

function acCo(el) {
  const v=el.value.trim().toLowerCase();const drop=document.getElementById('ac-co');
  if(v.length<1){drop.style.display='none';return;}
  const map={};
  S.inquiries.forEach(i=>{if(i.company.toLowerCase().includes(v))map[i.company]=(map[i.company]||[]).concat(i);});
  const keys=Object.keys(map);
  if(!keys.length){drop.style.display='none';return;}
  drop.innerHTML=keys.slice(0,6).map(k=>`<div class="ac-item" onmousedown="pickCo('${k.replace(/'/g,"\\'")}')"><div class="ci" style="width:22px;height:22px;font-size:10px">${k[0]}</div>${k}</div>`).join('');
  drop.style.display='block';
}

function pickCo(name) {
  const d=document.getElementById('ac-co');if(d)d.style.display='none';
  document.getElementById('fc').value=name;
  const matches=S.inquiries.filter(i=>i.company.toLowerCase()===name.toLowerCase());
  if(!matches.length)return;
  const byC={};matches.forEach(i=>{if(!byC[i.contact])byC[i.contact]=i;});
  const keys=Object.keys(byC);
  if(keys.length===1){fillContact(byC[keys[0]]);}
  else{const d2=document.getElementById('ac-ct');d2.innerHTML=keys.map(k=>`<div class="ac-item" onmousedown="fillContact(${JSON.stringify(byC[k]).replace(/"/g,'&quot;')})"><div class="av" style="width:22px;height:22px;font-size:10px">${byC[k].customer[0]}</div>${byC[k].customer} — ${k}</div>`).join('');d2.style.display='block';}
}

function fillContact(inq){
  document.getElementById('fcu').value=inq.customer||'';
  document.getElementById('fco').value=inq.contact||'';
  const s=document.getElementById('fsr');if(inq.source)s.value=inq.source;
  const d=document.getElementById('ac-ct');if(d)d.style.display='none';
}

async function submitInq() {
  const company=document.getElementById('fc').value.trim();
  const customer=document.getElementById('fcu').value.trim();
  const contact=document.getElementById('fco').value.trim();
  const source=document.getElementById('fsr').value;
  const stage=document.getElementById('fst').value;
  const note=document.getElementById('fnt').value.trim();
  const err=document.getElementById('fe');
  const validProds=formProds.filter(p=>p.name.trim());
  if(!company||!customer||!contact||!source){err.textContent='Please fill all required fields.';return;}
  if(!validProds.length){err.textContent='Please add at least one product.';return;}
  err.textContent='';
  showLoad('Saving...');
  if(S.editId){
    const inq=S.inquiries.find(i=>i.id===S.editId);
    const prev=inq?inq.stage:stage;
    const history=[...(inq?inq.history:[]),{action:prev!==stage?'Stage changed to '+stage:'Details updated',by:S.user.name,at:Date.now()}];
    const res=await api({action:'updateInquiry',id:S.editId,company,customer,contact,source,products:JSON.stringify(validProds),stage,note,history:JSON.stringify(history)});
    if(res.success){if(inq)Object.assign(inq,{company,customer,contact,source,products:validProds,stage,note,history});toast('Inquiry updated!');}
    else toast('Error: '+res.error);
    S.editId=null;formProds=[{name:'',qty:'',rate:'',status:'Pending'}];S.page='all';
  } else {
    const res=await api({action:'addInquiry',company,customer,contact,source,products:JSON.stringify(validProds),stage,note,salesId:S.user.id,salesName:S.user.name});
    if(res.success){S.inquiries.push({id:res.data.id,company,customer,contact,source,products:validProds,stage,note,salesId:S.user.id,salesName:S.user.name,createdAt:Date.now(),history:[{action:'Created — '+stage,by:S.user.name,at:Date.now()}]});toast('Inquiry saved!');}
    else toast('Error: '+res.error);
    formProds=[{name:'',qty:'',rate:'',status:'Pending'}];S.page='inquiries';
  }
  hideLoad();draw();
}

// ── Detail modal ───────────────────────────────────────────
function openDetail(id) {
  const inq=S.inquiries.find(i=>i.id===id);if(!inq)return;
  const isMgr=S.user.role==='manager';
  const isOwn=inq.salesId===S.user.id;
  const canEdit=inq.stage!=='Dispatch';
  const canMove=(isOwn||isMgr)&&inq.stage!=='Dispatch'&&inq.stage!=='Lost';
  const canLose=(isOwn||isMgr)&&inq.stage!=='Ordered'&&inq.stage!=='Dispatch'&&inq.stage!=='Lost';
  const canEditRates=(isOwn||isMgr)&&canEdit;
  const prods=inq.products||[];
  document.getElementById('ms').innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="ci" style="width:44px;height:44px;font-size:17px">${inq.company[0]}</div>
          <div><div style="font-size:16px;font-weight:600">${inq.company}</div>
          <div style="font-size:12px;color:var(--text2)">${inq.customer} · ${inq.contact}</div></div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${badgeHtml(inq.stage)}
          <button class="btn-ghost" onclick="closeModal()"><i class="ti ti-x" style="font-size:16px"></i></button>
        </div>
      </div>
      <div class="modal-body">
        <div class="detail-row"><span class="dl">Source</span><span class="dv">${inq.source}</span></div>
        <div class="detail-row"><span class="dl">Sales person</span><span class="dv">${inq.salesName}</span></div>
        <div class="detail-row"><span class="dl">Created</span><span class="dv">${new Date(inq.createdAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</span></div>
        ${inq.note?`<div class="detail-row"><span class="dl">Note</span><span class="dv">${inq.note}</span></div>`:''}
        ${inq.lostReason?`<div class="detail-row"><span class="dl" style="color:var(--red)">Lost reason</span><span class="dv" style="color:var(--red);font-weight:500">${inq.lostReason}</span></div>`:''}
        <div class="divider"></div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Products (${prods.length})</div>
        <div class="tbl-wrap" style="margin-bottom:4px">
          <table class="prod-tbl">
            <thead><tr><th style="width:33%">Product</th><th style="width:18%">Qty</th><th style="width:22%">Rate given</th><th style="width:27%">Status</th></tr></thead>
            <tbody id="prod-detail"></tbody>
          </table>
        </div>
        ${canMove?`
        <div class="divider"></div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Move stage</div>
        <div class="stage-pills">
          ${STAGES.filter(s=>s!=='Lost'&&s!==inq.stage).map(s=>`<button class="stage-pill" onclick="moveStage('${id}','${s}')">${s}</button>`).join('')}
          ${canLose?`<button class="stage-pill lost-pill" onclick="showLostForm()"><i class="ti ti-x" style="font-size:12px"></i> Mark as lost</button>`:''}
        </div>
        <div id="lost-form" style="display:none" class="lost-form">
          <div class="fg"><label>Reason</label>
          <select id="lrs" onchange="document.getElementById('lrc').style.display=this.value==='More'?'block':'none'">
            <option value="">Select reason...</option>${LOST_R.map(r=>`<option>${r}</option>`).join('')}<option value="More">More (type below)</option>
          </select></div>
          <div id="lrc" class="fg" style="display:none"><label>Custom reason</label><input id="lrt" placeholder="Enter reason..."></div>
          <button class="btn btn-danger btn-sm" onclick="confirmLost('${id}')"><i class="ti ti-check"></i> Confirm lost</button>
        </div>`:''}
        <div class="divider"></div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Activity history</div>
        <div>${(inq.history||[]).slice().reverse().map(h=>`<div class="hist-item"><span class="hist-time">${fd(h.at)}</span><span class="hist-txt">${h.action} <span style="color:var(--text3)">· ${h.by}</span></span></div>`).join('')}</div>
      </div>
      ${isMgr?`<div class="modal-foot">
        <button class="btn btn-sm" onclick="openEdit('${id}')"><i class="ti ti-edit"></i> Edit</button>
        <button class="btn btn-sm btn-danger" onclick="delInq('${id}')"><i class="ti ti-trash"></i> Delete</button>
      </div>`:''}
    </div>
  </div>`;
  // Render product detail rows
  const tb=document.getElementById('prod-detail');if(!tb)return;
  tb.innerHTML=prods.map((p,idx)=>`<tr>
    <td style="font-weight:600">${p.name}</td>
    <td style="color:var(--text2)">${p.qty||'—'}</td>
    <td>${canEditRates
      ?`<input value="${p.qty||''}" placeholder="e.g. 50 pcs" onchange="updateQty('${id}',${idx},this.value)" style="font-size:13px;padding:4px 8px;width:90px">`
      :`<span style="color:var(--text2)">${p.qty||'—'}</span>`
    }</td>
    <td>${canEditRates
      ?`<input value="${p.rate||''}" placeholder="₹45/pc" onchange="updateRate('${id}',${idx},this.value)" style="font-size:13px;color:var(--brand);font-weight:600;font-family:'DM Mono',monospace;padding:4px 8px">`
      :`<span class="rate-val">${p.rate||'—'}</span>`
    }</td>
    <td>${canEditRates
      ?`<select onchange="updateProdStatus('${id}',${idx},this.value)" style="font-size:12px;padding:4px 8px">${PROD_STATUS.map(s=>`<option ${p.status===s?'selected':''}>${s}</option>`).join('')}</select>`
      :`<span style="color:var(--text2)">${p.status}</span>`
    }</td>
  </tr>`).join('');
}

async function updateQty(id,idx,val){
  const inq=S.inquiries.find(i=>i.id===id);if(!inq)return;
  inq.products[idx].qty=val;
  inq.history=[...(inq.history||[]),{action:`Qty updated: ${inq.products[idx].name} → ${val}`,by:S.user.name,at:Date.now()}];
  await api({action:'updateInquiry',id,products:JSON.stringify(inq.products),history:JSON.stringify(inq.history)});
  toast('Quantity saved!');
}
async function updateRate(id,idx,val){
  const inq=S.inquiries.find(i=>i.id===id);if(!inq)return;
  inq.products[idx].rate=val;
  inq.history=[...(inq.history||[]),{action:`Rate updated: ${inq.products[idx].name} → ${val}`,by:S.user.name,at:Date.now()}];
  await api({action:'updateInquiry',id,products:JSON.stringify(inq.products),history:JSON.stringify(inq.history)});
  toast('Rate saved!');
}
async function updateProdStatus(id,idx,status){
  const inq=S.inquiries.find(i=>i.id===id);if(!inq)return;
  inq.products[idx].status=status;
  inq.history=[...(inq.history||[]),{action:`${inq.products[idx].name} → ${status}`,by:S.user.name,at:Date.now()}];
  await api({action:'updateInquiry',id,products:JSON.stringify(inq.products),history:JSON.stringify(inq.history)});
}

function closeModal(){const ms=document.getElementById('ms');if(ms)ms.innerHTML='';}
function showLostForm(){document.getElementById('lost-form').style.display='block';}

async function moveStage(id,stage){
  const inq=S.inquiries.find(i=>i.id===id);if(!inq)return;
  inq.stage=stage;inq.history=[...(inq.history||[]),{action:'Stage moved to '+stage,by:S.user.name,at:Date.now()}];
  showLoad('Updating...');
  await api({action:'updateInquiry',id,stage,history:JSON.stringify(inq.history)});
  hideLoad();closeModal();toast('Stage updated!');renderPage();
}
async function confirmLost(id){
  const sel=document.getElementById('lrs').value;
  const reason=sel==='More'?(document.getElementById('lrt').value.trim()):sel;
  if(!reason){alert('Please select or enter a reason.');return;}
  const inq=S.inquiries.find(i=>i.id===id);if(!inq)return;
  inq.stage='Lost';inq.lostReason=reason;
  inq.history=[...(inq.history||[]),{action:'Marked lost — '+reason,by:S.user.name,at:Date.now()}];
  showLoad('Updating...');
  await api({action:'updateInquiry',id,stage:'Lost',lostReason:reason,history:JSON.stringify(inq.history)});
  hideLoad();closeModal();toast('Marked as lost.');renderPage();
}

function openEdit(id){
  closeModal();formProds=[{name:'',qty:'',rate:'',status:'Pending'}];
  S.editId=id;S.page='new';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.textContent.trim()==='New Inquiry'));
  renderPage();
}
async function delInq(id){
  if(!confirm('Permanently delete this inquiry?'))return;
  showLoad('Deleting...');
  await api({action:'deleteInquiry',id});
  S.inquiries=S.inquiries.filter(i=>i.id!==id);
  hideLoad();closeModal();toast('Inquiry deleted.');renderPage();
}

// ── Users ──────────────────────────────────────────────────
function pgUsers(ca) {
  ca.innerHTML=`
  <div style="max-width:520px">
    <div class="page-head">
      <div><div class="page-title">Users</div><div class="page-sub">Manage your sales team</div></div>
      <button class="btn btn-primary btn-sm" onclick="showAddUser()"><i class="ti ti-plus"></i> Add user</button>
    </div>
    <div class="card" style="margin-bottom:16px">
      ${S.users.map(u=>`<div class="user-row">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="av">${u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
          <div>
            <div style="font-size:14px;font-weight:600">${u.name}</div>
            <div style="font-size:12px;color:var(--text2)">${u.role==='manager'?'Full access — can edit, delete & manage users':'Sales access — can log & update inquiries'}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="role-tag ${u.role==='manager'?'tag-mgr':'tag-sales'}">${u.role}</span>
          ${u.id!==S.user.id?`
            <select class="btn btn-sm" style="padding:4px 8px;font-size:11px" onchange="changeUserRole('${u.id}',this.value)">
              <option value="sales" ${u.role==='sales'?'selected':''}>sales</option>
              <option value="manager" ${u.role==='manager'?'selected':''}>manager</option>
            </select>
            <button class="btn btn-icon btn-sm btn-danger" onclick="removeUser('${u.id}')" title="Remove"><i class="ti ti-trash" style="font-size:13px"></i></button>
          `:'<span style="font-size:11px;color:var(--text3)">(you)</span>'}
        </div>
      </div>`).join('')}
    </div>
    <div id="add-user-panel" style="display:none" class="card">
      <div class="form-section">Add new user</div>
      <div class="fg"><label>Full name <span class="req">*</span></label><input id="nu-n" placeholder="Full name"></div>
      <div class="fg"><label>Password <span class="req">*</span></label><input id="nu-p" type="password" placeholder="Set a password"></div>
      <div class="fg"><label>Role</label>
        <select id="nu-r">
          <option value="sales">Sales</option>
          <option value="manager">Manager</option>
        </select>
      </div>
      <div class="form-err" id="nu-err"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="addUser()"><i class="ti ti-check"></i> Add user</button>
        <button class="btn btn-sm" onclick="document.getElementById('add-user-panel').style.display='none'">Cancel</button>
      </div>
    </div>
  </div>`;
}

function showAddUser(){document.getElementById('add-user-panel').style.display='block';document.getElementById('nu-n').focus();}

async function addUser(){
  const name=document.getElementById('nu-n').value.trim();
  const pass=document.getElementById('nu-p').value;
  const role=document.getElementById('nu-r').value;
  const err=document.getElementById('nu-err');
  if(!name||!pass){err.textContent='Name and password are required.';return;}
  if(S.users.find(u=>u.name.toLowerCase()===name.toLowerCase())){err.textContent='A user with this name already exists.';return;}
  showLoad('Adding user...');
  const res=await api({action:'addUser',name,password:pass,role});
  if(res.success){S.users.push(res.data);toast('User added!');}
  else toast('Error: '+res.error);
  hideLoad();pgUsers(document.getElementById('ca'));
}

async function changeUserRole(id,role){
  showLoad('Updating role...');
  const res=await api({action:'changeRole',id,role});
  if(res.success){const u=S.users.find(u=>u.id===id);if(u)u.role=role;toast('Role updated!');}
  else toast('Error: '+res.error);
  hideLoad();pgUsers(document.getElementById('ca'));
}

async function removeUser(id){
  if(!confirm('Remove this user?'))return;
  showLoad('Removing...');
  await api({action:'removeUser',id});
  S.users=S.users.filter(u=>u.id!==id);
  hideLoad();toast('User removed.');pgUsers(document.getElementById('ca'));
}

// ── Helpers ────────────────────────────────────────────────
function badgeHtml(s){return `<span class="badge ${BADGE_CLS[s]||'b-new'}"><span class="badge-dot ${DOT_CLS[s]||'bd-new'}"></span>${s}</span>`;}
function fd(ts){return new Date(Number(ts)).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function lastUpdated(inq){
  // Get the timestamp of the last activity history entry, fallback to createdAt
  const hist = inq.history || [];
  if(hist.length > 0){
    const last = hist[hist.length - 1];
    return last.at ? Number(last.at) : inq.createdAt;
  }
  return inq.createdAt;
}

// ── Boot ───────────────────────────────────────────────────
init();
</script>
